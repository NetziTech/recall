# SonarQube configuration for @netzi/recall
# Quality gate validated by qa-sonarqube-auditor agent.
# Project URL: https://sonar.netzi.dev/dashboard?id=recall

sonar.projectKey=recall
sonar.projectName=Recall
sonar.projectVersion=0.1.2

# Source layout
sonar.sources=src
sonar.tests=tests

# Inclusions / exclusions
sonar.exclusions=**/*.spec.ts,**/*.bench.ts,**/migrations/**,dist/**,node_modules/**,coverage/**
sonar.test.inclusions=**/*.spec.ts,**/*.integration.spec.ts,**/*.e2e.spec.ts

# Coverage exclusions (mirror code/vitest.config.ts coverage.exclude per
# docs/12 §1 R4: composition/bootstrap son wiring puro, *.port.ts son
# interfaces TypeScript-only, repositories son contratos puros). Estas
# exclusiones evitan que el wiring infle el deficit de coverage que
# corresponde al codigo ejecutable real.
sonar.coverage.exclusions=src/composition/**,src/bootstrap/**,src/**/*.port.ts,src/**/index.ts,src/modules/*/domain/repositories/*.ts,src/shared/domain/types/branded.ts,src/shared/domain/types/domain-event.ts

# Coverage report (Vitest with v8 provider emits LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Quality gate strict (waits for server-side gate result, fails CI if not passed)
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8

# ============================================================================
# Quality gate thresholds (definidos en el server SonarQube; documentados aqui
# para referencia. Configurar el quality gate "MCP Memoria Strict" con:
#
#   Coverage on new code:        >= 95.0
#   Coverage on overall code:    >= 95.0
#   Duplicated lines (%):        <= 3.0
#   Maintainability rating:      A
#   Reliability rating:          A
#   Security rating:             A
#   Security review rating:      A
#   Bugs:                        = 0
#   Vulnerabilities:             = 0
#   Code smells (blocker):       = 0
#   Code smells (critical):      = 0
#   Technical debt ratio:        <= 5.0%
# ============================================================================
