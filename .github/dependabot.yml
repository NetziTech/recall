version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/code"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      types-and-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"
          - "tsx"
          - "tsup"
        update-types:
          - "minor"
          - "patch"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # tar / fastembed: wontfix con ADR-004 hasta v0.5 (swap embedder).
      # Bumps automaticos no resuelven el problema y solo crean ruido.
      - dependency-name: "fastembed"
      - dependency-name: "tar"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 3
    target-branch: "develop"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
